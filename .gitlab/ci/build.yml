build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    IMAGE_NAME: "openbudget/data-pipeline"
    IMAGE_TAG: "$CI_COMMIT_SHORT_SHA"
    CONTAINER_ARCHIVE: "data-pipeline-container.tar"
  script:
    - docker build -t $IMAGE_NAME:$IMAGE_TAG .
    - docker save -o $CONTAINER_ARCHIVE $IMAGE_NAME:$IMAGE_TAG
  artifacts:
    name: "$CI_JOB_NAME-$CI_COMMIT_REF_SLUG"
    paths:
      - $CONTAINER_ARCHIVE
    expire_in: 1 week
  only:
    - main
    - tags
