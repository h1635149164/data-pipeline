schemas:
  stage: schemas
  image: ghcr.io/astral-sh/uv:python3.14-bookworm-slim
  script:
    - uv sync --frozen
    - uv run python scripts/push_schemas.py
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        - schemas/*
        - schemas/**/*
    - if: '$CI_PIPELINE_SOURCE == "web"'
